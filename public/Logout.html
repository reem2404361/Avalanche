<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalanche | Goodbye</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/logout.css">
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div class="rays" id="rays"></div>

<div class="card">

    <div class="sun-wrap">
        <svg class="sun-rays-svg" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="43.5" y="4"  width="3" height="14" rx="1.5" fill="#FFB703" opacity="0.7"/>
            <rect x="43.5" y="72" width="3" height="14" rx="1.5" fill="#FFB703" opacity="0.7"/>
            <rect x="4"   y="43.5" width="14" height="3" rx="1.5" fill="#FFB703" opacity="0.7"/>
            <rect x="72"  y="43.5" width="14" height="3" rx="1.5" fill="#FFB703" opacity="0.7"/>
            <rect x="16.1" y="12.7" width="3" height="14" rx="1.5" fill="#FFB703" opacity="0.5" transform="rotate(-45 16.1 12.7)"/>
            <rect x="60.2" y="56.8" width="3" height="14" rx="1.5" fill="#FFB703" opacity="0.5" transform="rotate(-45 60.2 56.8)"/>
            <rect x="56.8" y="12.7" width="3" height="14" rx="1.5" fill="#FFB703" opacity="0.5" transform="rotate(45 56.8 12.7)"/>
            <rect x="12.7" y="56.8" width="3" height="14" rx="1.5" fill="#FFB703" opacity="0.5" transform="rotate(45 12.7 56.8)"/>
        </svg>
        <div class="sun-core"></div>
    </div>

    <span class="emoji">😔</span>
    <p class="bye-label">See you soon</p>
    <h1 class="bye-heading">Goodbye, Jack!</h1>
    <p class="bye-sub">We'll miss you around here.<br>Come back and keep the sun shining. ☀️</p>

    <div class="redirect-wrap">
        <p class="redirect-text">Redirecting to login...</p>
        <div class="redirect-bar">
            <div class="redirect-fill"></div>
        </div>
    </div>

    <p class="stamp">Avalanche Solar Systems</p>
</div>

<script src="js/logout.js"></script>
</body>
</html>
