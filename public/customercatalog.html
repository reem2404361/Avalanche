<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <title>User Catalog</title>
    <link rel="stylesheet" href="css/customercatalog.css">
</head>

<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <div class="toggle-row">
                <h2>Avalanche</h2>
                <button class="toggle-btn" id="toggle-btn"><svg viewBox="0 0 24 24" width="24" height="24"
                        stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M3 12h18M3 6h18M3 18h18"></path>
                    </svg></button>
            </div>
            <p>User Control Panel</p>

        </div>

        <ul>
            <li>
                <button class="side-btn dashboard">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="11" width="7" height="9"></rect>
                        <rect x="3" y="15" width="7" height="5"></rect>
                    </svg>
                    <span class="side-btn-text">Dashboard</span>
                </button>
            </li>

            <li>
                <button class="side-btn orders">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="side-btn-text">Order History</span>
                </button>
            </li>

            <li>
                <button class="side-btn catalog" id="current">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                        <line x1="7" y1="7" x2="7.01" y2="7"></line>
                    </svg>
                    <span class="side-btn-text">Catalog</span>
                </button>
            </li>

            <li>
                <button class="side-btn appointments">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="side-btn-text">Schedule</span>
                </button>
            </li>
        </ul>

        <div class="side-bottom">
            <hr />
            <button class="side-btn logout">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span class="side-btn-text">Log Out</span>
            </button>
        </div>
    </aside>


    <main class="admin-main" id="main-content">
        <div class="content-padding">
            <header class="catalog-header">
                <div>
                    <span
                        style="letter-spacing: 2px; font-weight: 800; color: var(--accent); font-size: 0.75rem;">EQUIPMENT
                        STORE</span>
                    <h1>Premium Solar<br>Inventory</h1>
                </div>
                <div class="cart-status" id="cart-badge" onclick="goToCheckout()">
                    <span>🛒</span>
                    <span id="cart-count">0 ITEMS</span>
                </div>
            </header>
            <div class="filter-tabs">
                <div class="tab active" onclick="filterBy('all', this)">All Products</div>
                <div class="tab" onclick="filterBy('panels', this)">Solar Panels</div>
                <div class="tab" onclick="filterBy('inverters', this)">Inverters</div>
                <div class="tab" onclick="filterBy('storage', this)">Energy Storage</div>
            </div>
            <div class="product-grid" id="product-grid"></div>
        </div>

        <footer class="sitefooter">
            <div class="fbox">
                <h2 class="logo">AVALANCHE</h2>
                <p style="opacity: 0.6; font-size: 0.9rem; line-height: 1.5">
                    Empowering sustainable<br />
                    growth in Egypt.
                </p>
            </div>

            <div class="fbox">
                <h3>COMPANY</h3>
                <span>Privacy Policy</span>
                <span>Terms of Service</span>
            </div>

            <div class="fbox">
                <h3>CONNECT</h3>
                <div class="contact-icons">
                    <ul>
                        <li>
                            <a href="https://facebook.com">
                                <!-- facebook Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                                    <path
                                        d="M160 96C124.7 96 96 124.7 96 160L96 480C96 515.3 124.7 544 160 544L258.2 544L258.2 398.2L205.4 398.2L205.4 320L258.2 320L258.2 286.3C258.2 199.2 297.6 158.8 383.2 158.8C399.4 158.8 427.4 162 438.9 165.2L438.9 236C432.9 235.4 422.4 235 409.3 235C367.3 235 351.1 250.9 351.1 292.2L351.1 320L434.7 320L420.3 398.2L351 398.2L351 544L480 544C515.3 544 544 515.3 544 480L544 160C544 124.7 515.3 96 480 96L160 96z" />
                                </svg>
                                </svg>
                            </a>
                        </li>

                        <li>
                            <a href="https://linkedin.com">
                                <!-- LinkedIn Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                                    <path
                                        d="M160 96C124.7 96 96 124.7 96 160L96 480C96 515.3 124.7 544 160 544L480 544C515.3 544 544 515.3 544 480L544 160C544 124.7 515.3 96 480 96L160 96zM165 266.2L231.5 266.2L231.5 480L165 480L165 266.2zM236.7 198.5C236.7 219.8 219.5 237 198.2 237C176.9 237 159.7 219.8 159.7 198.5C159.7 177.2 176.9 160 198.2 160C219.5 160 236.7 177.2 236.7 198.5zM413.9 480L413.9 376C413.9 351.2 413.4 319.3 379.4 319.3C344.8 319.3 339.5 346.3 339.5 374.2L339.5 480L273.1 480L273.1 266.2L336.8 266.2L336.8 295.4L337.7 295.4C346.6 278.6 368.3 260.9 400.6 260.9C467.8 260.9 480.3 305.2 480.3 362.8L480.3 480L413.9 480z" />
                                </svg>
                            </a>
                        </li>

                        <li>
                            <a href="mailto:hello@avalanche.eg">
                                <!-- Email Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                                    <path
                                        d="M112 128C85.5 128 64 149.5 64 176C64 191.1 71.1 205.3 83.2 214.4L291.2 370.4C308.3 383.2 331.7 383.2 348.8 370.4L556.8 214.4C568.9 205.3 576 191.1 576 176C576 149.5 554.5 128 528 128L112 128zM64 260L64 448C64 483.3 92.7 512 128 512L512 512C547.3 512 576 483.3 576 448L576 260L377.6 408.8C343.5 434.4 296.5 434.4 262.4 408.8L64 260z" />
                                </svg>
                            </a>
                        </li>

                        <li>
                            <a href="tel:+20000000000">
                                <!-- Phone Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                                    <path
                                        d="M224.2 89C216.3 70.1 195.7 60.1 176.1 65.4L170.6 66.9C106 84.5 50.8 147.1 66.9 223.3C104 398.3 241.7 536 416.7 573.1C493 589.3 555.5 534 573.1 469.4L574.6 463.9C580 444.2 569.9 423.6 551.1 415.8L453.8 375.3C437.3 368.4 418.2 373.2 406.8 387.1L368.2 434.3C297.9 399.4 241.3 341 208.8 269.3L253 233.3C266.9 222 271.6 202.9 264.8 186.3L224.2 89z" />
                                </svg>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </footer>
    </main>

    <div class="cart-overlay" id="cart-overlay">
        <div class="cart-popup">
            <div class="cart-header">
                <h2 style="font-weight: 800;">Your Cart</h2>
                <button onclick="toggleCart()" style="background:none; border:none; font-size:1.5rem;">✕</button>
            </div>
            <div id="cart-view-items" style="display: flex; flex-direction: column; height: 100%;">
                <div class="cart-items-list" id="cart-items-list"></div>
                <div style="border-top: 2px solid #eee; padding-top: 20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:800;">
                        <span>Total:</span><span id="cart-total">EGP 0</span>
                    </div>
                    <button class="checkout-btn" style="width: 100%;" onclick="showCheckoutForm()">Continue to
                        Info</button>
                </div>
            </div>
            <div id="cart-view-form" class="checkout-form">
                <h3 style="margin-bottom:10px;">Shipping Details</h3>
                <input type="text" id="cust-name" placeholder="Full Name">
                <input type="email" id="cust-email" placeholder="Email Address">
                <input type="tel" id="cust-phone" placeholder="Phone Number">
                <input type="text" id="cust-address" placeholder="Delivery Address">
                <button class="checkout-btn" onclick="completePurchase()">Place Order</button>
                <button onclick="showCartItems()"
                    style="background:none; border:none; margin-top:10px; opacity:0.5; font-weight:700;">Back to
                    cart</button>
            </div>
        </div>
    </div>

    <script src="js/customercatalog.js"></script>
</body>

</html>
