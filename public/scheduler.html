<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Avalanche | Scheduler</title>
</head>
<body>
    <div id="cursor"></div><div id="cursor-ring"></div>

    <aside class="sidebar">
        <div class="logo"><h2>AVALANCHE</h2></div>
        <nav><a href="dashb.html">Dashboard</a><a href="scheduler.html" class="active">Scheduler</a></nav>
    </aside>

    <main class="content">
        <header class="top-bar"><h3 style="font-weight: 900;">AUDIT BOOKING</h3></header>

        <section id="step-1" class="p-12">
            <div class="bg-[#E5E2D1] p-12 rounded-[50px] shadow-sm">
                <div class="flex justify-between items-center mb-10">
                    <button onclick="changeMonth(-1)" class="p-4 hover:bg-black/5 rounded-full transition font-black text-2xl">←</button>
                    <h2 id="monthLabel" class="text-3xl font-black uppercase tracking-tighter">April 2026</h2>
                    <button onclick="changeMonth(1)" class="p-4 hover:bg-black/5 rounded-full transition font-black text-2xl">→</button>
                </div>
                <div id="calendar-days" class="grid grid-cols-7 gap-4"></div>
                <button onclick="nextStep()" class="main-btn mt-12 w-full py-6 text-xl">CONFIRM DATE</button>
            </div>
        </section>

        <section id="step-2" style="display: none;" class="p-12">
            <div class="grid grid-cols-3 gap-10">
                <form onsubmit="handleOrder(event)" id="orderForm" class="col-span-2 bg-white p-12 rounded-[50px] shadow-xl relative">
                    <h2 class="text-4xl font-black mb-10">Details</h2>
                    <div class="grid grid-cols-2 gap-8 mb-6">
                        <input type="text" placeholder="Full Name" required class="p-4 border-b-2 outline-none font-bold">
                        <input type="number" placeholder="Age (18-60)" min="18" max="60" required class="p-4 border-b-2 outline-none font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-8 mb-10">
                        <input type="email" placeholder="Email" required class="p-4 border-b-2 outline-none font-bold">
                        <input type="tel" placeholder="Phone" pattern="[0-9]{11}" required class="p-4 border-b-2 outline-none font-bold">
                    </div>

                    <div id="bus-track" class="w-full h-3 bg-slate-100 mb-12 relative overflow-visible rounded-full">
                        <div id="fill-path" class="absolute h-full bg-yellow-400 w-0 transition-all rounded-full"></div>
                        <img id="bus-img" src="pic/bus animation.png" class="absolute -top-6 -left-20 w-24 h-auto transition-all">
                    </div>

                    <div class="flex gap-4">
                        <button type="submit" class="main-btn flex-1 py-6">PLACE ORDER</button>
                        <button type="button" onclick="resetAll()" class="bg-slate-100 px-12 rounded-xl font-black">RESET</button>
                    </div>
                </form>

                <div class="bg-[#0D1321] p-12 rounded-[50px] text-white shadow-2xl h-fit">
                    <h4 class="text-xs font-black opacity-40 mb-12">SUMMARY</h4>
                    <div class="flex justify-between font-black text-4xl">
                        <span>Total</span><span class="text-yellow-400">EGP 2,500</span>
                    </div>
                </div>
            </div>
        </section>
        <footer class="bottom-bar"><p>© 2026 Avalanche Solar Systems</p></footer>
    </main>

    <script src="js/scheduler.js"></script>
    <script>
        function resetAll() {
            document.getElementById('orderForm').reset();
            document.getElementById('fill-path').style.width = '0%';
            document.getElementById('bus-img').style.left = '-5rem';
        }
    </script>
</body>
</html>
