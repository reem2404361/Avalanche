<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <title>Admin Catalog</title>
    <link rel="stylesheet" href="css/admincatalog.css">

</head>

<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-header-text">Admin Console</h2>
            <p class="sidebar-discreption">Control Panel</p>
            <button class="toggle-btn" id="toggle-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M3 12h18M3 6h18M3 18h18"></path>
                </svg>
            </button>
        </div>

        <ul>
            <li>
                <button class="side-btn dashboard">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="11" width="7" height="9"></rect>
                        <rect x="3" y="15" width="7" height="5"></rect>
                    </svg>
                    <span class="side-btn-text">Dashboard</span>
                </button>
            </li>

            <li>
                <button class="side-btn orders" id="current">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="side-btn-text">Order Management</span>
                </button>
            </li>

            <li>
                <button class="side-btn catalog">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                        <line x1="7" y1="7" x2="7.01" y2="7"></line>
                    </svg>
                    <span class="side-btn-text">Catalog</span>
                </button>
            </li>

            <li>
                <button class="side-btn appointments">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="side-btn-text">Appointments</span>
                </button>
            </li>
        </ul>

        <div class="side-bottom">
            <hr />
            <button class="side-btn logout">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span class="side-btn-text">Log Out</span>
            </button>
        </div>
    </aside>


    <main class="admin-main" id="main-content">
        <!-- NAV -->
        <nav>
            <div class="nav-left">Avalanche</div>
            <div class="nav-right">
                <a href="#">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path
                            d="M320 64C302.3 64 288 78.3 288 96L288 99.2C215 114 160 178.6 160 256L160 277.7C160 325.8 143.6 372.5 113.6 410.1L103.8 422.3C98.7 428.6 96 436.4 96 444.5C96 464.1 111.9 480 131.5 480L508.4 480C528 480 543.9 464.1 543.9 444.5C543.9 436.4 541.2 428.6 536.1 422.3L526.3 410.1C496.4 372.5 480 325.8 480 277.7L480 256C480 178.6 425 114 352 99.2L352 96C352 78.3 337.7 64 320 64zM258 528C265.1 555.6 290.2 576 320 576C349.8 576 374.9 555.6 382 528L258 528z" />
                    </svg>
                </a>
                <a href="#">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path
                            d="M259.1 73.5C262.1 58.7 275.2 48 290.4 48L350.2 48C365.4 48 378.5 58.7 381.5 73.5L396 143.5C410.1 149.5 423.3 157.2 435.3 166.3L503.1 143.8C517.5 139 533.3 145 540.9 158.2L570.8 210C578.4 223.2 575.7 239.8 564.3 249.9L511 297.3C511.9 304.7 512.3 312.3 512.3 320C512.3 327.7 511.8 335.3 511 342.7L564.4 390.2C575.8 400.3 578.4 417 570.9 430.1L541 481.9C533.4 495 517.6 501.1 503.2 496.3L435.4 473.8C423.3 482.9 410.1 490.5 396.1 496.6L381.7 566.5C378.6 581.4 365.5 592 350.4 592L290.6 592C275.4 592 262.3 581.3 259.3 566.5L244.9 496.6C230.8 490.6 217.7 482.9 205.6 473.8L137.5 496.3C123.1 501.1 107.3 495.1 99.7 481.9L69.8 430.1C62.2 416.9 64.9 400.3 76.3 390.2L129.7 342.7C128.8 335.3 128.4 327.7 128.4 320C128.4 312.3 128.9 304.7 129.7 297.3L76.3 249.8C64.9 239.7 62.3 223 69.8 209.9L99.7 158.1C107.3 144.9 123.1 138.9 137.5 143.7L205.3 166.2C217.4 157.1 230.6 149.5 244.6 143.4L259.1 73.5zM320.3 400C364.5 399.8 400.2 363.9 400 319.7C399.8 275.5 363.9 239.8 319.7 240C275.5 240.2 239.8 276.1 240 320.3C240.2 364.5 276.1 400.2 320.3 400z" />
                    </svg>
                </a>
                <a href="#">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path
                            d="M320 312C253.7 312 200 258.3 200 192C200 125.7 253.7 72 320 72C386.3 72 440 125.7 440 192C440 258.3 386.3 312 320 312zM289.5 368L350.5 368C360.2 368 368 375.8 368 385.5C368 389.7 366.5 393.7 363.8 396.9L336.4 428.9L367.4 544L368 544L402.6 405.5C404.8 396.8 413.7 391.5 422.1 394.7C484 418.3 528 478.3 528 548.5C528 563.6 515.7 575.9 500.6 575.9L139.4 576C124.3 576 112 563.7 112 548.6C112 478.4 156 418.4 217.9 394.8C226.3 391.6 235.2 396.9 237.4 405.6L272 544.1L272.6 544.1L303.6 429L276.2 397C273.5 393.8 272 389.8 272 385.6C272 375.9 279.8 368.1 289.5 368.1z" />
                    </svg>
                </a>
            </div>
        </nav>

        <div class="content-padding">
            <header class="catalog-header">
                <div>
                    <span
                        style="letter-spacing: 2px; font-weight: 800; color: var(--accent); font-size: 0.75rem;">CENTRAL
                        REPOSITORY</span>
                    <h1>Product & Pricing<br>Catalog</h1>
                </div>
                <button class="add-product-btn" onclick="openModal()">Add New Product</button>
            </header>

            <div class="filter-tabs">
                <div class="tab active" onclick="filterBy('all', this)">All Inventory</div>
                <div class="tab" onclick="filterBy('panels', this)">Solar Panels</div>
                <div class="tab" onclick="filterBy('inverters', this)">Inverters</div>
                <div class="tab" onclick="filterBy('storage', this)">Energy Storage</div>
            </div>

            <div class="product-grid" id="product-grid"></div>
        </div>

        <footer class="sitefooter">
            <p class="footer-left">AVALANCHE © 2026. EMPOWERING SUSTAINABLE GROWTH.</p>
            <div class="footer-right">
                <p>SYSTEM STATUS: ONLINE</p>
                <p>PRIVACY POLICY</p>
                <p>TERMS OF SERVICE</p>
            </div>
        </footer>
    </main>

    <div class="modal" id="product-modal">
        <div class="modal-content">
            <h2 id="modal-title">Edit Product</h2>
            <input type="text" id="p-name" placeholder="Product Name">
            <input type="text" id="p-price" placeholder="Price (e.g. 8,450)">
            <input type="number" id="p-stock" placeholder="Stock Quantity">
            <select id="p-category">
                <option value="panels">Solar Panels</option>
                <option value="inverters">Inverters</option>
                <option value="storage">Storage</option>
            </select>
            <input type="text" id="p-img" placeholder="Image URL">
            <button class="save-btn" onclick="saveProduct()">Save Product</button>
            <button onclick="closeModal()"
                style="background:none; border:none; width:100%; margin-top:10px; opacity:0.5; font-weight:700;">Cancel</button>
        </div>
    </div>
    
    <script src="js/admincatalog.js"></script>
</body>

</html>
